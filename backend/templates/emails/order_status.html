<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ status_label }}</title>
</head>
<body style="margin:0;padding:0;background:#f4f4f5;font-family:'Segoe UI',Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" style="max-width:560px;background:#ffffff;border-radius:18px;overflow:hidden;">
          <tr>
            <td style="background:linear-gradient(135deg,#801337,#E62E72);padding:32px;text-align:center;">
              <h1 style="margin:0;color:#ffffff;font-size:24px;">{{ status_label }}</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:28px 32px;">
              <p style="margin:0 0 12px;font-size:15px;color:#444444;">Dear {{ order.full_name }},</p>
              <p style="margin:0 0 12px;font-size:15px;color:#444444;">Your order <strong>#{{ order.order_number }}</strong> has been updated to: <strong style="color:#E62E72;">{{ status_label }}</strong>.</p>
              <p style="margin:0;font-size:14px;color:#666666;">Thank you for trusting {{ site_name }}.</p>
            </td>
          </tr>
          {% include "emails/partials/social_footer.html" %}
        </table>
      </td>
    </tr>
  </table>
</body>
</html>

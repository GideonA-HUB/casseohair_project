<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#111111;">
  <tr>
    <td align="center" style="padding:28px 24px;">
      <p style="margin:0 0 16px;font-size:13px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:#ffffff;">Follow {{ site_name }}</p>
      <p style="margin:0 0 18px;">
        <a href="{{ instagram_url }}" style="display:inline-block;margin:0 8px;color:#ffffff;text-decoration:none;font-size:13px;font-weight:600;">Instagram</a>
        <a href="{{ tiktok_url }}" style="display:inline-block;margin:0 8px;color:#ffffff;text-decoration:none;font-size:13px;font-weight:600;">TikTok</a>
        <a href="{{ whatsapp_url }}" style="display:inline-block;margin:0 8px;color:#ffffff;text-decoration:none;font-size:13px;font-weight:600;">WhatsApp</a>
        <a href="mailto:{{ contact_email }}" style="display:inline-block;margin:0 8px;color:#ffffff;text-decoration:none;font-size:13px;font-weight:600;">Email</a>
      </p>
      <p style="margin:0;font-size:12px;line-height:1.6;color:#888888;">
        © {% now "Y" %} {{ site_name }}. Luxury hair, delivered with care.<br>
        <a href="{{ site_url }}" style="color:#E62E72;text-decoration:none;">{{ site_url }}</a>
      </p>
    </td>
  </tr>
</table>

version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: casseohair
      POSTGRES_USER: casseohair
      POSTGRES_PASSWORD: casseohair_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    ports:
      - '8000:8000'
    environment:
      DEBUG: 'True'
      SECRET_KEY: dev-secret-key-change-in-production
      DATABASE_URL: postgresql://casseohair:casseohair_dev@db:5432/casseohair
      ALLOWED_HOSTS: localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      FRONTEND_URL: http://localhost:5173
      DELIVERY_FEE: '4000'
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - media_data:/app/media

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    volumes:
      - ./frontend:/app

volumes:
  postgres_data:
  media_data:
